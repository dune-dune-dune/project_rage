name: autoantibug

services:
  video_gateway:
    # -ffmpeg variant bundles ffmpeg for the H264 transcode paths (cam*_h264).
    image: bluenviron/mediamtx:1.18.2-ffmpeg
    restart: unless-stopped
    environment:
      # ICE hosts advertised to the browser: turret LAN + VPN. See
      # services/web/docker-compose.yml for why both are listed.
      MTX_WEBRTCADDITIONALHOSTS: ${MEDIAMTX_HOSTS:-192.168.88.33,10.20.100.1}
    ports:
      # - "8888:8888" --- HLS is disabled, so this is not needed.
      - "8889:8889"
      - "8189:8189/udp"
      # Publish RTSP only if external publishers/readers are needed.
      # - "8554:8554"
    volumes:
      - ./services/video_gateway/mediamtx.yml:/mediamtx.yml:ro



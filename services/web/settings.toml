# Control tuning for the turret cockpit.
# Deployment / network / secrets live in .env — NOT here.

[control]
send_rate_hz = 20        # command stream cadence (20 Hz = 50 ms period)
deadman_ms = 400         # no fresh browser input for longer than this -> neutral
speed_percent = 100      # global speed scale, 10..100
# Rotation-speed levels (percent) selectable with keys 1..N. Multiplies manual
# motion velocity; the last level is the default (fastest). Auto-track ignores it.
speed_levels = [50, 100]

[axes]
# Normalised velocity amplitudes (0..1) per axis.
rotation_v_unit = 0.5
elevation_v_up_unit = 0.5
elevation_v_down_unit = 0.5

[fire]
mode = "short"        # short | medium | manual
duration_short = 161
duration_medium = 605

# AI auto-track (key T) — closed-loop visual servo tuning. There is no camera
# FOV calibration, so tracking drives velocity to null the target's pixel error
# from the (possibly offset) crosshair. gain: velocity per unit normalised error;
# deadzone: |error| below this (fraction of frame) commands zero; max_velocity:
# cap on the normalised velocity (0..1). aim_timeout_ms: if the browser stops
# sending track updates for longer than this, the aim velocity zeroes (fail-safe).
# imgsz: YOLO model input size fed to the browser-side ONNX inference.
[track]
gain = 2.5
deadzone = 0.02
max_velocity = 0.5
aim_timeout_ms = 500
imgsz = 640

# Camera switcher (TAB cycles through these). `path` is a MediaMTX path; the
# full WHEP URL is <gateway base>/<path>/whep, where the base is derived from
# WHEP_URL (or WHEP_BASE / VIDEO_GATEWAY_HOST_IP) in .env. Add the *_hd paths
# here too if the host has CPU headroom for 1080p transcoding.
[video]
streams = [
    { label = "CAM 95", path = "cam95_h264" },
    { label = "CAM 96", path = "cam96_h264" },
]

# Control tuning for the turret cockpit.
# Deployment / network / secrets live in .env — NOT here.

[control]
send_rate_hz = 20        # command stream cadence (20 Hz = 50 ms period)
deadman_ms = 400         # no fresh browser input for longer than this -> neutral
ramp_ms = 250            # soft-start: ms to ramp a manual axis 0 -> full; 0 disables
speed_percent = 100      # global speed scale, 10..100
# Min spacing (ms) between turret rangefinder requests while Shift is held. Paces
# the edge-triggered rangefinder_seq on the command stream (NOT the serial TF03).
rangefinder_measure_interval_ms = 250
# Rotation-speed levels (percent) selectable with keys 1..N. Multiplies manual
# motion velocity. Auto-track ignores it. The list need NOT be sorted: the boot
# default is the *highest* percent, so level 3 (1 %, fine aim) can live at the
# end — where it maps to key `3` — without becoming the startup speed.
#   key 1 = 50 %   key 2 = 100 % (default)   key 3 = 1 % (fine aim)
speed_levels = [50, 100, 1]

[axes]
# Normalised velocity amplitudes (0..1) per axis.
rotation_v_unit = 0.8
elevation_v_up_unit = 0.8
elevation_v_down_unit = 0.8

[fire]
mode = "short"        # short | medium | manual
duration_short = 161
duration_medium = 605

# Camera-pointing drive (cameras_p). In camera mode (key 5) W/S move the physical
# camera axis; the target angle is integrated server-side at rate_deg_s and clamped
# to [min_deg, max_deg]. Aim-only — never touches arm/fire.
[camera]
rate_deg_s = 15
min_deg = -30
max_deg = 30

# AI auto-track (key T) — closed-loop visual servo tuning. There is no camera
# FOV calibration, so tracking drives velocity to null the target's pixel error
# from the (possibly offset) crosshair. gain: velocity per unit normalised error;
# deadzone: |error| below this (fraction of frame) commands zero; max_velocity:
# cap on the normalised velocity (0..1). aim_timeout_ms: if the browser stops
# sending track updates for longer than this, the aim velocity zeroes (fail-safe).
# imgsz: YOLO model input size fed to the browser-side ONNX inference.
[track]
gain = 2.5
deadzone = 0.02
max_velocity = 0.5
aim_timeout_ms = 500
imgsz = 640

# NOTE: the camera list moved OUT of this file. The video gateway host and the
# MediaMTX stream paths are now per-profile (local LAN / remote VPN) settings in
# SQLite, editable from the cockpit UI (⚙ -> Налаштування мережі). Defaults:
# app/migrations/0002_seed_network.sql.

# Turret cockpit stack: Flask/Gunicorn control UI + MediaMTX video gateway.
#
# LINUX (full stack in Docker):
#   cd services/web && cp .env.example .env && docker compose up --build
#
# macOS / Windows (Docker Desktop has NO host networking, so a container cannot
# bind the RWS source IP): run ONLY the video gateway in Docker and the cockpit
# natively on the host —
#   cd services/web && cp .env.example .env
#   docker compose up video_gateway        # video only
#   ./run-native.sh                        # cockpit natively -> binds RWS_SRC_IP
#
# `cockpit` uses host networking to bind RWS_SRC_IP:RWS_SRC_PORT and reach the
# turret; that works on Docker Engine (Linux) only.
name: rws_cockpit

services:
  cockpit:
    build:
      # Build context is the repo root so rws_control.py is available.
      context: ../..
      dockerfile: services/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    network_mode: host
    volumes:
      # Live-editable control tuning without rebuilding the image.
      - ./settings.toml:/app/settings.toml:ro
      # Persist runtime data across restarts/rebuilds: the settings database
      # (cockpit.db — crosshair, AI, map, video profiles) and the ONNX model.
      - ./data:/app/data
    depends_on:
      - video_gateway

  exporter:
    # Converts uploaded YOLO weights (.pt) to ONNX for the cockpit's AI mode.
    # Separate container because it is the only thing that needs ultralytics/torch:
    # a torch export can peg the CPU for minutes, and the cockpit's single worker
    # also runs the 20 Hz turret loop. See services/exporter/README.md.
    build:
      context: ../..
      dockerfile: services/exporter/Dockerfile
    restart: unless-stopped
    # Published on LOOPBACK ONLY: the cockpit (host networking on Linux, or native
    # on macOS) reaches it at 127.0.0.1:8901, while the turret LAN cannot — this
    # endpoint writes files and has no auth of its own.
    ports:
      - "127.0.0.1:8901:8901"
    # Never let an export starve the turret loop: at most one core, and the lowest
    # CPU priority when cores are contended.
    cpus: "1.0"
    cpu_shares: 128
    volumes:
      # The same directory the cockpit mounts at /app/data — it writes the uploaded
      # checkpoint here, the exporter writes model.onnx + classes.json back.
      - ./data:/data

  video_gateway:
    # -ffmpeg variant bundles ffmpeg for the H264 transcode paths (cam*_h264).
    image: bluenviron/mediamtx:1.18.2-ffmpeg
    restart: unless-stopped
    environment:
      # ICE hosts MediaMTX advertises to the browser. BOTH the LAN and the VPN
      # address are listed, so the cockpit's local/remote video switch (⚙ ->
      # Налаштування мережі) needs no container restart. The Jetson's .env is
      # never rewritten by the deploy, so this default is what production uses —
      # keep the literals correct.
      MTX_WEBRTCADDITIONALHOSTS: ${MEDIAMTX_HOSTS:-192.168.88.33,10.20.100.1}
    ports:
      - "8889:8889"        # WebRTC / WHEP signaling
      - "8189:8189/udp"    # WebRTC local UDP media
    volumes:
      - ../video_gateway/mediamtx.yml:/mediamtx.yml:ro

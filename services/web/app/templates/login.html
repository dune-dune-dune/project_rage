<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RWS Cockpit — Вхід</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: #000; color: #e8f0f2;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body { display: flex; align-items: center; justify-content: center; }
    form {
      display: flex; flex-direction: column; gap: 16px;
      width: min(320px, 86vw);
      padding: 28px 24px;
      background: #0d1214;
      border: 1px solid #1e2a2e;
      border-radius: 12px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.14em; color: #7f939a; text-transform: uppercase; }
    input {
      font: inherit; font-size: 26px; letter-spacing: 0.4em; text-align: center;
      padding: 12px 10px;
      color: #e8f0f2; background: #000;
      border: 1px solid #2a3a40; border-radius: 8px;
      outline: none;
    }
    input:focus { border-color: #3fa7d6; }
    button {
      font: inherit; font-weight: 600;
      padding: 12px; cursor: pointer;
      color: #04121a; background: #3fa7d6;
      border: none; border-radius: 8px;
    }
    button:hover { background: #58b9e4; }
    .error { margin: 0; font-size: 13px; color: #e06767; min-height: 1em; }
  </style>
</head>
<body>
  <form method="post" action="{{ url_for('cockpit.login_post') }}">
    <h1>RWS Cockpit</h1>
    <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="off"
           pattern="[0-9]{7}" maxlength="7" placeholder="•••••••" autofocus required />
    <p class="error">{{ error or "" }}</p>
    <button type="submit">Увійти</button>
  </form>
  <script>
    // Digits only; auto-submit once 7 digits are entered.
    const pin = document.getElementById("pin");
    pin.addEventListener("input", () => {
      pin.value = pin.value.replace(/\D/g, "").slice(0, 7);
      if (pin.value.length === 7) pin.form.submit();
    });
  </script>
</body>
</html>
